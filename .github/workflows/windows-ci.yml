name: Windows CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-publish:
    name: Build, test, package Windows
    runs-on: windows-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.302
          cache: true
          cache-dependency-path: windows/**/packages.lock.json
      - name: PowerShell syntax
        shell: pwsh
        run: |
          Get-ChildItem .\scripts\*.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { throw ($errors | Out-String) }
          }
      - name: Locked restore
        run: dotnet restore .\Sprekr.sln --locked-mode --configfile .\NuGet.Config
      - name: Build
        run: dotnet build .\Sprekr.sln --configuration Release --no-restore
      - name: Unit tests
        run: dotnet test .\tests\Sprekr.Windows.Tests\Sprekr.Windows.Tests.csproj --configuration Release --no-build --filter "Category!=ModelIntegration" --logger "trx;LogFileName=windows-tests.trx"
      - name: Vulnerability audit
        run: dotnet list .\Sprekr.sln package --vulnerable --include-transitive
      - name: Self-contained development build
        shell: pwsh
        run: .\scripts\build-development-unsigned.ps1 -OutputDirectory .\artifacts
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Sprekr-windows-x64-development-unsigned
          path: |
            windows/artifacts/Sprekr-windows-x64-development-unsigned.zip
            windows/artifacts/Sprekr-windows-x64-development-unsigned.zip.sha256
          if-no-files-found: error
          retention-days: 14
