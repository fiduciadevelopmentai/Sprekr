name: macOS source audit

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Test, build, scan, package
    runs-on: macos-15
    timeout-minutes: 45
    env:
      SPREKR_SWIFT_SCRATCH_PATH: /tmp/sprekr-swift-build
    steps:
      - name: Check out full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install audit dependency
        run: brew install ripgrep
      - name: Run local publication gate
        run: make audit
