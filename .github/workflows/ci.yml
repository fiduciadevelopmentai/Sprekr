name: macOS source audit

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Test, build, scan, package
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install audit dependency
        run: brew install ripgrep
      - name: Run local publication gate
        run: make audit
