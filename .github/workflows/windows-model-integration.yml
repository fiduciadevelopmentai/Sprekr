name: Windows model integration

on:
  push:
    branches: [master]
    paths:
      - "windows/**"
      - "global.json"
      - ".github/workflows/windows-model-integration.yml"
  pull_request:
    branches: [master]
    paths:
      - "windows/**"
      - "global.json"
      - ".github/workflows/windows-model-integration.yml"
  schedule:
    - cron: "23 3 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  synthetic-model-test:
    runs-on: windows-latest
    timeout-minutes: 50
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.302
          cache: true
          cache-dependency-path: windows/**/packages.lock.json
      - name: Resolve per-user model cache
        shell: pwsh
        run: '"SPREKR_MODEL_CACHE=$env:LOCALAPPDATA\Sprekr\Models" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.SPREKR_MODEL_CACHE }}
          key: parakeet-v3-int8-5793d0fd397c5778
      - name: Locked restore
        run: dotnet restore .\Sprekr.sln --locked-mode --configfile .\NuGet.Config
      - name: Build tests
        run: dotnet build .\tests\Sprekr.Windows.Tests\Sprekr.Windows.Tests.csproj --configuration Release --no-restore
      - name: Offline transcription with bundled synthetic WAV only
        env:
          SPREKR_RUN_MODEL_INTEGRATION: "1"
        run: dotnet test .\tests\Sprekr.Windows.Tests\Sprekr.Windows.Tests.csproj --configuration Release --no-build --filter "Category=ModelIntegration" --logger "trx;LogFileName=windows-model-integration.trx"
