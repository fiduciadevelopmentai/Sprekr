name: Bug report
description: Report a reproducible Sprekr problem without private dictation data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include transcript text, recordings, clipboard contents, another app's field contents, tokens, Keychain data, or unredacted logs. For security issues, use Private Vulnerability Reporting instead of this form.
  - type: input
    id: version
    attributes:
      label: Sprekr version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac chip
      placeholder: macOS 14.x, Apple M1
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Sanitized reproduction steps
      description: Use synthetic example text only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed all transcript, audio, clipboard, field-content, token, and Keychain material.
          required: true
